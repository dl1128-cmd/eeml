name: Update citations + journal metadata

on:
  schedule:
    # Daily at 03:00 UTC (= 12:00 KST). Scholar changes are gradual so once a day is plenty.
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      # When a new paper is added via admin (or any publications.json edit),
      # run the matcher right away so the new entry gets its citation count
      # without waiting for the next daily cron. Safe from infinite loops:
      # the job's own commit uses GITHUB_TOKEN, which by default does NOT
      # re-trigger workflows.
      - "data/publications.json"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Scholar and update citations
        id: cites
        run: python scripts/update-citations.py

      - name: Fetch CrossRef and update volume/issue/page
        id: meta
        run: python scripts/update-metadata.py

      - name: Commit & push if changed
        if: steps.cites.outputs.changed == 'true' || steps.meta.outputs.changed == 'true'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json data/config.json
          if git diff --cached --quiet; then
            echo "No actual diff — skipping commit."
          else
            # Pick the message that matches what actually changed.
            CITES="${{ steps.cites.outputs.changed }}"
            META="${{ steps.meta.outputs.changed }}"
            if [ "$CITES" = "true" ] && [ "$META" = "true" ]; then
              MSG="chore: auto-update citations (Scholar) + journal metadata (CrossRef)"
            elif [ "$META" = "true" ]; then
              MSG="chore: auto-update journal metadata (volume/issue/page) from CrossRef"
            else
              MSG="chore: auto-update citation counts from Google Scholar"
            fi
            git commit -m "$MSG"
            git push
          fi

name: Update citations from Google Scholar

on:
  schedule:
    # Daily at 03:00 UTC (= 12:00 KST). Scholar changes are gradual so once a day is plenty.
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Scholar and update JSON
        id: update
        run: python scripts/update-citations.py

      - name: Commit & push if changed
        if: steps.update.outputs.changed == 'true'
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json data/config.json
          if git diff --cached --quiet; then
            echo "No actual diff — skipping commit."
          else
            git commit -m "chore: auto-update citation counts from Google Scholar"
            git push
          fi

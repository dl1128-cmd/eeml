<main>
  <section class="page-header">
    <div class="container">
      <div class="eyebrow">EEML</div>
      <h1 data-i18n="publications.title">Publications</h1>
    </div>
  </section>

  <!-- Journal Cover Gallery -->
  <section class="section section-tight" id="journal-covers-section" hidden>
    <div class="container">
      <div class="jc-header">
        <div>
          <div class="eyebrow" data-i18n="publications.covers_eyebrow">Featured</div>
          <h2 class="jc-title" data-i18n="publications.covers_title">Journal Cover Gallery</h2>
        </div>
        <div class="jc-nav-btns" id="jc-nav-btns" hidden>
          <button class="jc-nav-btn" data-jc-dir="prev" aria-label="Previous">‹</button>
          <button class="jc-nav-btn" data-jc-dir="next" aria-label="Next">›</button>
        </div>
      </div>
      <div class="jc-track-wrap">
        <div class="jc-track" id="journal-covers-track"></div>
      </div>
    </div>
  </section>

  <!-- Cover detail modal -->
  <div id="jc-modal" class="jc-modal" hidden>
    <div class="jc-modal-backdrop" data-jc-close></div>
    <div class="jc-modal-box">
      <button class="jc-modal-close" data-jc-close aria-label="Close">✕</button>
      <div class="jc-modal-image"><img id="jc-modal-img" alt="" /></div>
      <div class="jc-modal-body">
        <div class="jc-modal-meta">
          <span id="jc-modal-journal"></span>
          <span class="jc-modal-sep" id="jc-modal-sep" hidden>·</span>
          <span id="jc-modal-year"></span>
        </div>
        <h3 id="jc-modal-title"></h3>
        <p id="jc-modal-desc"></p>
        <a id="jc-modal-link" class="btn btn-outline btn-sm" target="_blank" rel="noopener" hidden>Read paper ↗</a>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="publications-root"></div>
    </div>
  </section>
